syntax = "proto3";

package sales.v1;

option go_package = "github.com/makesalekz/sales/api/sales/v1;sales_v1";

message Sale {
  int64 id = 1;
  int64 tenant_id = 2;
  int64 shift_id = 3;
  int64 cashier_id = 4;
  string total = 5;
  string discount_total = 6;
  string payment_type = 7;
  string status = 8;
  string created_at = 9;
  repeated SaleItem items = 10;
  string discount_type = 11;
  string discount_value = 12;
}

message SaleItem {
  int64 id = 1;
  int64 sale_id = 2;
  int64 product_id = 3;
  string product_name = 4;
  string quantity = 5;
  string unit_price = 6;
  string discount = 7;
  string total = 8;
}

message Shift {
  int64 id = 1;
  int64 tenant_id = 2;
  int64 cashier_id = 3;
  string opening_amount = 4;
  string closing_amount = 5;
  string total_sales = 6;
  string total_returns = 7;
  string status = 8;
  string opened_at = 9;
  string closed_at = 10;
  string created_at = 11;
  optional int64 store_id = 12;
}

message ZReport {
  int64 shift_id = 1;
  int64 cashier_id = 2;
  string opening_amount = 3;
  string closing_amount = 4;
  string total_sales = 5;
  string total_returns = 6;
  string expected_cash = 7;
  int32 sales_count = 8;
  int32 returns_count = 9;
  string opened_at = 10;
  string closed_at = 11;
}

message Return {
  int64 id = 1;
  int64 tenant_id = 2;
  int64 sale_id = 3;
  int64 cashier_id = 4;
  string total = 5;
  string created_at = 6;
  repeated ReturnItem items = 7;
}

message ReturnItem {
  int64 id = 1;
  int64 return_id = 2;
  int64 sale_item_id = 3;
  int64 product_id = 4;
  string quantity = 5;
  string unit_price = 6;
  string total = 7;
}

message CashierLogEntry {
  int64 id = 1;
  int64 tenant_id = 2;
  int64 cashier_id = 3;
  int64 shift_id = 4;
  string action = 5;
  int64 entity_id = 6;
  string entity_type = 7;
  string amount = 8;
  string description = 9;
  string created_at = 10;
}
